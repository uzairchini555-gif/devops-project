name: CI/CD Pipeline 
on: 
  push: 
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs: 
  build-and-deploy: 
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Set Up Python
      uses: actions/setup-python@v4
      with: 
       python-version: 3.11
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask 
    - name: Build Docker Image 
      run: docker build -t project-app . 
    - name: Run Container (optional local test)
      run: docker run -d -p 5000:5000 project-app 
