apiVersion: apps/v1
kind: Deployment
metadata: 
  name: project-deployment
spec:
  replicas: 2
  selector:
    matchLabels: 
      app: project-app
  template: 
    metadata:
      labels: 
        app: project-app
    spec:
      containers:
      - name: project-container
        image: project-app
        imagePullPolicy: Never
        ports:
        - containerPort: 5000

